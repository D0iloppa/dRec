# 개발용 오버라이드 — doil-sb를 nodemon 핫리로드로 띄운다.
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d doil-sb
#
# 기본 `docker compose up`은 이 파일을 적용하지 않으므로 prod(docker-compose.yml)로 동작한다.
# (override.yml로 두지 않은 이유: 서버 기본 기동을 prod로 유지하기 위함)
services:
  doil-sb:
    build:
      context: ./doil-sb
      dockerfile: Dockerfile.dev
    image: doil-sb:dev
    working_dir: /app
    environment:
      - NODE_ENV=development
    volumes:
      - ./doil-sb:/app
    command: npm run dev
    tty: true
    stdin_open: true
