services:
  doil-gw:
    image: nginx:latest
    container_name: doil-gw
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/live:/etc/ssl/live:ro
      - ./nginx/html:/app/html
      - ./nginx/cdn:/app/cdn
    restart: unless-stopped
    networks:
      - dev-net

  doil-react-builder:
    build: ./doil-react
    container_name: doil-react-builder
    volumes:
      - ./doil-react:/app
    profiles:
      - builder
    networks:
      - dev-net

  # doil-app: /sb/app 에서 서빙되는 React SPA (빌더 전용, dist를 nginx/html/sb/app 로 배포)
  doil-app-builder:
    build: ./doil-app
    container_name: doil-app-builder
    volumes:
      - ./doil-app:/app
    profiles:
      - builder
    networks:
      - dev-net

  doil-wiki:
    build:
      context: ./doil-wiki
      dockerfile: Dockerfile
    container_name: doil-wiki
    restart: unless-stopped
    networks:
      - dev-net

  # DEPRECATED: lsh 서비스 전용 DB. 신규 연동은 db 서비스를 사용할 것.
  db_lsh:
    image: postgres:latest
    container_name: db_lsh
    restart: unless-stopped
    environment:
      POSTGRES_DB: lsh
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: dbdnpfzjs1!
    volumes:
      - ./postgres_lsh/data:/var/lib/postgresql/data
    networks:
      - dev-net

  db:
    image: postgres:latest
    container_name: db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dev
      POSTGRES_USER: doil
      POSTGRES_PASSWORD: doildev1!
    ports:
      - "5432:5432"
    volumes:
      - dev_db_data:/var/lib/postgresql/data
      - ./dev_db/init:/docker-entrypoint-initdb.d
    networks:
      - dev-net

  # doil-sb BFF (Express). prod: 소스를 이미지에 굽고 node로 직접 실행.
  # 개발 핫리로드는 docker-compose.dev.yml 오버라이드 참고.
  doil-sb:
    build:
      context: ./doil-sb
      dockerfile: Dockerfile
    image: doil-sb:latest
    container_name: doil-sb
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - dev-net

  lsh_react:
    image: node:lts-bullseye
    container_name: lsh_react
    working_dir: /app
    volumes:
      - ./lsh_react:/app
    command: sh   # 수동 진입을 위한 shell만
    tty: true
    stdin_open: true
    restart: unless-stopped
    networks:
      - dev-net

  lsh_staff:
    image: node:lts-bullseye
    container_name: lsh_staff
    working_dir: /app
    volumes:
      - ./lsh_staff:/app
    command: sh
    tty: true
    stdin_open: true
    restart: unless-stopped
    networks:
      - dev-net

  postfix:
    # doil.me 도메인의 MX. 수신/송신 모두 담당.
    #   - 25 : 외부 메일서버 → postfix 인바운드. 수신 후 doil.me 메일은 mailpit(ohno_mailpit:1025) 로 위임.
    #   - 587: submission. SASL 인증된 클라이언트(=ohno_mailpit 릴레이)만 외부로 송신 허용.
    # SASL 사용자는 SMTPD_SASL_USERS 로 정의 (user:pass 쉼표 구분). 실제 값은 .env 에서 주입.
    image: boky/postfix:latest
    container_name: postfix
    hostname: doil.me
    restart: unless-stopped
    ports:
      - "25:25"
      - "587:587"
    environment:
      HOSTNAME: doil.me
      # ALLOWED_SENDER_DOMAINS 는 DKIM 키 생성 대상을 결정. boky 가 이 변수로
      # check_sender_access 도 추가하지만 아래 smtpd_recipient_restrictions 오버라이드로 무력화됨.
      # → DKIM 키만 생성, 외부 *@* → doil.me 인바운드는 그대로 허용.
      ALLOWED_SENDER_DOMAINS: doil.me
      SMTPD_SASL_USERS: "${POSTFIX_SASL_USERS:?POSTFIX_SASL_USERS must be set in .env}"
      # DKIM 자동생성 — 첫 기동 시 /etc/opendkim/keys/doil.me/ 에 키 생성.
      # 볼륨에 영속화 → 재기동 시 동일 키 재사용 (DNS TXT 안정).
      DKIM_AUTOGENERATE: "1"
      # doil.me 로 들어온 메일은 mailpit 으로 전달 (catch-all 저장 → 관리자 UI 에서 열람).
      POSTFIX_mydestination: ""
      POSTFIX_virtual_mailbox_domains: doil.me
      POSTFIX_virtual_transport: "smtp:[ohno_mailpit]:1025"
      POSTFIX_smtp_tls_security_level: may
      # MX 수신 허용: 목적지가 virtual_mailbox_domains(doil.me) 면 외부 발신도 OK.
      POSTFIX_smtpd_recipient_restrictions: "permit_mynetworks, permit_sasl_authenticated, reject_unauth_destination, reject"
    volumes:
      - ./postfix/dkim-keys:/etc/opendkim/keys
    networks:
      - dev-net

  mattermost:
    image: mattermost/mattermost-team-edition:latest
    container_name: mattermost
    restart: unless-stopped
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: "postgres://doil:doildev1!@db:5432/mattermost?sslmode=disable&connect_timeout=10"
      MM_SERVICESETTINGS_SITEURL: "https://doil.me/mm"
      MM_SERVICESETTINGS_LISTENADDRESS: ":8065"
      MM_FILESETTINGS_MAXFILESIZE: 104857600
    volumes:
      - mattermost_data:/mattermost/data
      - mattermost_logs:/mattermost/logs
      - mattermost_config:/mattermost/config
      - mattermost_plugins:/mattermost/plugins
    depends_on:
      - db
    networks:
      - dev-net


  # CouchDB — Obsidian Self-hosted LiveSync 동기화 허브.
  #   docs.doil.me 로 노출. 각 기기의 네이티브 Obsidian(LiveSync 플러그인)이 여기로 양방향 동기화.
  #   CORS/요청크기/single_node 설정은 ./couchdb/local.ini 로 주입 (LiveSync 필수).
  #   관리자 계정은 .env(COUCHDB_USER/PASSWORD) 로 주입.
  couchdb:
    image: couchdb:3
    container_name: couchdb
    restart: unless-stopped
    environment:
      COUCHDB_USER: "${COUCHDB_USER:?COUCHDB_USER must be set in .env}"
      COUCHDB_PASSWORD: "${COUCHDB_PASSWORD:?COUCHDB_PASSWORD must be set in .env}"
    volumes:
      - couchdb_data:/opt/couchdb/data
      # :ro 금지 — couchdb 엔트리포인트가 local.d 를 chown 하므로 rw 여야 부팅됨
      - ./couchdb/local.ini:/opt/couchdb/etc/local.d/livesync.ini
    networks:
      - dev-net

  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: imgproxy
    restart: unless-stopped
    networks:
      - dev-net
    volumes:
      - ./nginx/cdn:/cdn:ro
    environment:
      - IMGPROXY_LOCAL_FILESYSTEM_ROOT=/cdn
      - IMGPROXY_USE_ETAG=true
      - IMGPROXY_LOG_LEVEL=info
      - IMGPROXY_BIND=0.0.0.0:8080

networks:
  dev-net:
    external: true

volumes:
  pgdata:
  dev_db_data:
  mattermost_data:
  mattermost_logs:
  mattermost_config:
  mattermost_plugins:
  plane_data:
  couchdb_data:
