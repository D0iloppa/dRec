# cie.doil.me — Can I Eat (별도 프로젝트: cie/ — 자체 compose 로 dev-net 에 구동)
#   모든 경로 → cie 컨테이너(:3000). cie 가 정적 프론트 + /api 모두 서빙한다.

server {
    listen 80;
    server_name cie.doil.me;

    # ACME HTTP-01 챌린지 (인증서 갱신용) — 리다이렉트보다 먼저
    location /.well-known/acme-challenge/ {
        root /app/html;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name cie.doil.me;

    ssl_certificate /etc/ssl/live/doil.me/fullchain.pem;
    ssl_certificate_key /etc/ssl/live/doil.me/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/cie.access.log;
    error_log /var/log/nginx/cie.error.log;

    client_max_body_size 2M;

    location / {
        proxy_pass http://cie:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
