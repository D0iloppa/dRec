# HTTPS 서버 (443번 포트) - 메인 도메인
server {

    listen 443 ssl;
    http2 on;
    server_name doil.chickenkiller.com;

    client_max_body_size 20M;
    
    # SSL 인증서 설정
    ssl_certificate /etc/ssl/live/doil.chickenkiller.com/fullchain.pem;
    ssl_certificate_key /etc/ssl/live/doil.chickenkiller.com/privkey.pem;
    
    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # 기타 보안 헤더
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        
    # 로그 파일 설정
    access_log /var/log/nginx/doil.chickenkiller.com.access.log;
    error_log /var/log/nginx/doil.chickenkiller.com.error.log;


    
    # 기본 로케이션 설정
    location / {
        root /app/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # cdn 서빙용
    location /cdn/ {
        alias /app/cdn/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /cdn_test/ {
        # 요청: /cdn_test/tuto1.png
        # 결과: /insecure/.../fs:/cdn_storage/tuto1.png
        rewrite ^/cdn_test/(.*)$ /insecure/rs:fit:0:0/plain/fs:/cdn_storage/$1 break;

        proxy_pass http://imgproxy:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /jenkins/ {
        proxy_pass http://host.docker.internal:8080/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /jenkins;
    }


    # sandbox app
    location /sb/ {
        proxy_pass http://doil-sb:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /sb;  # 마운트 경로 전달
    }

    # lsh 개발용 서비스 (npm run dev)
    location /lsh/ {
        proxy_pass http://lsh_react:5173; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';


	    proxy_set_header Host lsh.host;

        proxy_cache_bypass $http_upgrade;
    }






    # lsh-staff 개발용 서비스 (npm run dev)
    location /lsh_staff/ {
        proxy_pass http://lsh_staff:5173; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';


	    proxy_set_header Host lsh.host;

        proxy_cache_bypass $http_upgrade;
    }


    location /lsh_admin/ {
        proxy_pass http://lsh_admin:5173; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';


	    proxy_set_header Host lsh.host;

        proxy_cache_bypass $http_upgrade;
    }

    location /lsh_api/ {
        #proxy_pass http://lsh_api:8080/;
        proxy_pass http://host.docker.internal:8180/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api;  # 필요한 경우
    }



    #location /doyclopedia-dev/ {
        #proxy_pass http://d-dev-react:5173; 
        #proxy_http_version 1.1;
        #proxy_set_header Upgrade $http_upgrade;
        #proxy_set_header Connection 'upgrade';


	    #proxy_set_header Host lsh.host;

        #proxy_cache_bypass $http_upgrade;
    #}

}