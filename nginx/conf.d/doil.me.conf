# oh!NO 서비스 라우팅
server {
    listen 80;
    listen 443 ssl http2;
    server_name ohno.doil.me;

    # SSL 인증서 설정
    ssl_certificate /etc/ssl/live/doil.me/fullchain.pem;
    ssl_certificate_key /etc/ssl/live/doil.me/privkey.pem;

    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 기타 보안 헤더
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 로그 파일 설정
    access_log /var/log/nginx/ohno.access.log;
    error_log /var/log/nginx/ohno.error.log;

    client_max_body_size 20M;

    # ACME HTTP-01 챌린지 (SSL 인증서 갱신용)
    location /.well-known/acme-challenge/ {
        root /app/html;
        default_type text/plain;
    }

    # 랜딩 페이지: /landing → /landing/ (gateway 단 명시적 301)
    location = /landing {
        return 301 https://$host/landing/;
    }

    # oh!NO API — CORS는 FastAPI 미들웨어에서 처리 (nginx 중복 헤더 금지)
    location /api/ {
        proxy_pass http://host.docker.internal:18080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # oh!NO 메인 서비스로 라우팅 (18080 포트)
    location / {
        proxy_pass http://host.docker.internal:18080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
