# HTTP 서버 (80번 포트) - HTTPS로 리다이렉트
server {
    listen 80;
    server_name doil.me www.doil.me gwon.doil.me dev.doil.me;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 서버 (443번 포트) - 메인 도메인
server {

    listen 443 ssl;
    http2 on;
    server_name doil.me www.doil.me gwon.doil.me dev.doil.me;

    client_max_body_size 20M;
    
    # SSL 인증서 설정
    ssl_certificate /etc/ssl/live/doil.me/fullchain.pem;
    ssl_certificate_key /etc/ssl/live/doil.me/privkey.pem;
    
    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # 기타 보안 헤더
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        
    # 로그 파일 설정
    access_log /var/log/nginx/doil.me.access.log;
    error_log /var/log/nginx/doil.me.error.log;


    
    # 기본 로케이션 설정
    location / {
        root /app/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # cdn 서빙용 (imgproxy 활용)
    location /cdn/ {
        # 요청: /cdn/profile.webp
        # 결과: /insecure/.../plain/local:///$1
        rewrite ^/cdn/(.*)$ /insecure/rs:fit:0:0/plain/local:///$1 break;

        proxy_pass http://imgproxy:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

   




    # Developer Wiki
    location /wiki/ {
        proxy_pass http://doil-wiki:80/wiki/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Mattermost
    location /mm/ {
        resolver 127.0.0.11 valid=30s;
        set $mm_upstream http://mattermost:8065;
        proxy_pass $mm_upstream/mm/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
    }

    # OpenProject
    location /op/ {
        resolver 127.0.0.11 valid=30s;
        set $op_upstream http://openproject:8080;
        proxy_pass $op_upstream/op/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
    }

    # API gateway (doil-sb)
    location /api/ {
        proxy_pass http://doil-sb:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # sandbox app
    location = /sb {
        return 301 /sb/;
    }

    location /sb/ {
        proxy_pass http://doil-sb:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /sb;  # 마운트 경로 전달
    }

    # lsh 개발용 서비스 (npm run dev)
    location /lsh/ {
        proxy_pass http://lsh_react:5173; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';


	    proxy_set_header Host lsh.host;

        proxy_cache_bypass $http_upgrade;
    }

    # lsh-staff 개발용 서비스 (npm run dev)
    location /lsh_staff/ {
        proxy_pass http://lsh_staff:5173; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';


	    proxy_set_header Host lsh.host;

        proxy_cache_bypass $http_upgrade;
    }

    location /lsh_admin/ {
        proxy_pass http://lsh_admin:5173; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';


	    proxy_set_header Host lsh.host;

        proxy_cache_bypass $http_upgrade;
    }

    location /lsh_api/ {
        #proxy_pass http://lsh_api:8080/;
        proxy_pass http://host.docker.internal:8180/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api;  # 필요한 경우
    }

    

}

