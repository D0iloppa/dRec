# drec.doil.me — dRec (별도 repo: dRec/ 서브모듈 — 자체 compose 로 dev-net 에 구동)
#   모든 경로 → drec 컨테이너(:8080). drec 가 정적 프론트 + /api 모두 서빙한다.

server {
    listen 80;
    server_name drec.doil.me;

    # ACME HTTP-01 챌린지 (인증서 갱신용) — 리다이렉트보다 먼저
    location /.well-known/acme-challenge/ {
        root /app/html;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name drec.doil.me;

    ssl_certificate /etc/ssl/live/doil.me/fullchain.pem;
    ssl_certificate_key /etc/ssl/live/doil.me/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/drec.access.log;
    error_log /var/log/nginx/drec.error.log;

    # 회의 오디오 업로드 — 큰 파일 허용
    client_max_body_size 500M;
    # 전사+회의록 생성은 수 분이 걸릴 수 있으므로 업스트림 타임아웃 상향
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location / {
        # drec 컨테이너가 아직 안 떠 있어도 nginx 가 로드되도록 DNS 해석을 요청 시점으로 미룬다.
        resolver 127.0.0.11 valid=30s;
        set $drec_upstream http://drec:8080;
        proxy_pass $drec_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
