# Mac mini (M1) - Open WebUI (Ollama backend)
server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name mac.doil.me;

    # SSL (doil.me 와일드카드 공유)
    ssl_certificate     /etc/ssl/live/doil.me/fullchain.pem;
    ssl_certificate_key /etc/ssl/live/doil.me/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;

    access_log /var/log/nginx/mac.access.log;
    error_log  /var/log/nginx/mac.error.log;

    # LLM 응답: 길고, 스트리밍(SSE), 페이로드 큼
    client_max_body_size 50M;
    proxy_read_timeout   600s;
    proxy_send_timeout   600s;
    proxy_buffering      off;

    # ACME HTTP-01 챌린지 (인증서 갱신용)
    location /.well-known/acme-challenge/ {
        root /app/html;
        default_type text/plain;
    }

    # Open WebUI → Mac mini (VPN: 192.168.0.99:3000)
    location / {
        proxy_pass http://192.168.0.99:3000/;
        proxy_http_version 1.1;

        # WebSocket / SSE 업그레이드
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Open WebUI는 정상 Host/Origin 헤더 사용
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_cache_bypass $http_upgrade;
    }
}
