server {
    listen 80;
    server_name plane.doil.me;

    # ACME HTTP-01 챌린지 (webroot, 리다이렉트보다 먼저 매칭)
    location /.well-known/acme-challenge/ {
        root /app/html;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name plane.doil.me;

    ssl_certificate /etc/ssl/live/doil.me/fullchain.pem;
    ssl_certificate_key /etc/ssl/live/doil.me/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 100M;

    access_log /var/log/nginx/plane.access.log;
    error_log /var/log/nginx/plane.error.log;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $plane_upstream http://plane-proxy:80;
        proxy_pass $plane_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
